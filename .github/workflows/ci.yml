name: DevSecOps Pipeline

on:
  push:
    branches: ["main"]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Fix permissions (VERY IMPORTANT)
    - name: Fix workspace permissions
      run: |
        sudo chmod -R 777 $GITHUB_WORKSPACE

    # 3. Setup Java (for SonarCloud)
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 4. SonarCloud Scan (SAST)
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=srushti-ravindra_devsecops-project2
          -Dsonar.organization=srushti-ravindra
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.sources=.

    # 5. Run OWASP ZAP Scan (FINAL FIX)
    - name: Run OWASP ZAP Scan
      run: |
        docker run --rm \
        -u 0 \
        -v $GITHUB_WORKSPACE:/zap/wrk:rw \
        ghcr.io/zaproxy/zaproxy:stable \
        zap-baseline.py \
        -t https://demo.testfire.net \
        -r report_html.html \
        -w report_md.md \
        -J report_json.json
      continue-on-error: true

    # 6. Verify reports exist
    - name: Verify Reports
      run: |
        echo "Checking files..."
        ls -la

    # 7. Upload ZAP Reports (FINAL OUTPUT)
    - name: Upload ZAP Reports
      uses: actions/upload-artifact@v4
      with:
        name: zap-security-report
        path: |
          report_html.html
          report_md.md
          report_json.json