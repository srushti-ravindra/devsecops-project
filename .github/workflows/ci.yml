name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Setup Java (for SonarCloud)
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. SonarCloud Scan (SAST)
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=srushti-ravindra_devsecops-project2
          -Dsonar.organization=srushti-ravindra
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.sources=.

    # 4. OWASP ZAP Scan (FIXED - no permission error)
    - name: Run OWASP ZAP Scan
      run: |
        docker run --rm \
        -v $(pwd):/zap/wrk/:rw \
        ghcr.io/zaproxy/zaproxy:stable \
        zap-baseline.py \
        -t https://juice-shop.herokuapp.com \
        -J report_json.json \
        -w report_md.md \
        -r report_html.html