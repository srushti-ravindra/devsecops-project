name: DevSecOps Pipeline

on:
  push:
    branches: ["main"]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Setup Java (required for SonarCloud)
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. SonarCloud Scan (SAST)
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=srushti-ravindra_devsecops-project2
          -Dsonar.organization=srushti-ravindra
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.sources=.

    # 4. OWASP ZAP Scan (DAST)
    - name: Run OWASP ZAP Scan
      uses: zaproxy/action-baseline@v0.11.0
      with:
        target: "https://vvce.ac.in"
      continue-on-error: true

    # 5. Upload ZAP Reports
    - name: Upload ZAP Reports
      uses: actions/upload-artifact@v4
      with:
        name: zap-security-report
        path: |
          report_html.html
          report_md.md
          report_json.json