name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  sonar-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=srushti-ravindra_devsecops-project
          -Dsonar.organization=srushti-ravindra-org
          -Dsonar.sources=.